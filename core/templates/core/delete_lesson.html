<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Lesson | Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f9f9f9; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .warning-card { background: white; padding: 40px; border-radius: 12px; border: 1px solid #fca5a5; border-left: 6px solid #ef4444; max-width: 450px; text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-cancel { display: inline-block; margin-left: 15px; color: #4b5563; text-decoration: none; font-weight: 500; }
    </style>
</head>
<body>
    <div class="warning-card">
        <h1 style="color: #ef4444; margin-top: 0;">Delete Lesson?</h1>
        <p style="font-size: 1.1rem; color: #374151;">Are you sure you want to permanently delete <strong>"{{ lesson.title }}"</strong>?</p>
        <p style="color: #6b7280; font-size: 0.9rem; margin-bottom: 30px;">This action cannot be undone and any linked quizzes might be affected.</p>
        
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn-delete">Yes, Delete Lesson</button>
            <a href="{% url 'manage_lessons' %}" class="btn-cancel">No, Go Back</a>
        </form>
    </div>
</body>
</html>
