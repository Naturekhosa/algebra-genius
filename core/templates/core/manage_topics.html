<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Topics</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f9f9f9; display: flex; color: #333; }
        .sidebar { width: 220px; background: #f1f1f1; height: 100vh; border-right: 1px solid #ccc; position: fixed; }
        .sidebar-header { padding: 20px; text-align: center; font-weight: bold; border-bottom: 1px solid #ccc; background: #e8e8e8; }
        .nav-link { display: block; padding: 15px 20px; color: #444; text-decoration: none; border-bottom: 1px solid #ddd; }
        .nav-link.active { background: #e2e2e2; font-weight: bold; }
        
        .main-content { margin-left: 220px; padding: 40px; flex-grow: 1; }
        h1 { color: #555; font-weight: 600; margin-bottom: 30px; }
        
        .layout-grid { display: grid; grid-template-columns: 3fr 2fr; gap: 40px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f1f1; padding: 12px; text-align: left; border-bottom: 1px solid #ccc; color: #555; }
        td { padding: 15px 12px; border-bottom: 1px solid #eee; }
        
        .btn { padding: 5px 12px; border: 1px solid #ccc; border-radius: 4px; background: #f9f9f9; cursor: pointer; text-decoration: none; color: #555; font-size: 0.9rem; }
        .btn:hover { background: #e9e9e9; }
        
        .form-group { margin-bottom: 15px; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-save { background: #f1f1f1; border: 1px solid #ccc; padding: 8px 25px; border-radius: 4px; cursor: pointer; font-size: 1rem; color: #333; }
        .btn-save:hover { background: #e2e2e2; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">Admin Dashboard</div>
        <a href="{% url 'manage_topics' %}" class="nav-link active">Topics</a>
        <a href="#" class="nav-link">Lessons</a>
        <a href="#" class="nav-link">Quizzes</a>
        <a href="{% url 'teacher_dashboard' %}" class="nav-link">← Back to Dashboard</a>
    </div>

    <div class="main-content">
        <h1>Manage Topics</h1>
        
        <div class="layout-grid">
            <div>
                <table>
                    <thead>
                        <tr>
                            <th>Topic Name</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for topic in topics %}
                        <tr>
                            <td>{{ topic.name }}</td>
                            <td style="text-align: right;">
                                <a href="{% url 'edit_topic' topic.id %}" class="btn">Edit</a>
                                <a href="{% url 'delete_topic' topic.id %}" class="btn">Delete</a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr><td colspan="2">No topics found. Add one on the right!</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

            <div>
                <h3 style="color: #555; margin-top: 0;">Add New Topic</h3>
                <form method="POST" action="{% url 'manage_topics' %}">
                    {% csrf_token %}
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 5px; color: #555;">Topic Name</label>
                        {{ form.name }}
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 5px; color: #555;">Description</label>
                        {{ form.description }}
                    </div>
                    <button type="submit" class="btn-save">Save</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
