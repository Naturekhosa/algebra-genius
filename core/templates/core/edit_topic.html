<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Topic | Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f9f9f9; display: flex; color: #333; }
        .sidebar { width: 220px; background: #f1f1f1; height: 100vh; border-right: 1px solid #ccc; position: fixed; }
        .sidebar-header { padding: 20px; text-align: center; font-weight: bold; border-bottom: 1px solid #ccc; background: #e8e8e8; }
        .nav-link { display: block; padding: 15px 20px; color: #444; text-decoration: none; border-bottom: 1px solid #ddd; }
        .nav-link.active { background: #e2e2e2; font-weight: bold; }
        
        .main-content { margin-left: 220px; padding: 40px; flex-grow: 1; }
        h1 { color: #555; font-weight: 600; margin-bottom: 30px; }
        
        .form-card { background: white; padding: 30px; border-radius: 8px; border: 1px solid #ccc; max-width: 500px; }
        .form-group { margin-bottom: 20px; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        
        .btn-save { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        .btn-save:hover { background: #1d4ed8; }
        .btn-cancel { margin-left: 10px; text-decoration: none; color: #666; font-size: 0.95rem; }
        .btn-cancel:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">Admin Dashboard</div>
        <a href="{% url 'manage_topics' %}" class="nav-link active">Topics</a>
        <a href="#" class="nav-link">Lessons</a>
        <a href="#" class="nav-link">Quizzes</a>
        <a href="{% url 'teacher_dashboard' %}" class="nav-link">← Back to Dashboard</a>
    </div>

    <div class="main-content">
        <h1>Edit Topic: {{ topic.name }}</h1>
        
        <div class="form-card">
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label style="display: block; margin-bottom: 5px; color: #555; font-weight: 600;">Topic Name</label>
                    {{ form.name }}
                </div>
                <div class="form-group">
                    <label style="display: block; margin-bottom: 5px; color: #555; font-weight: 600;">Description</label>
                    {{ form.description }}
                </div>
                <div style="margin-top: 30px;">
                    <button type="submit" class="btn-save">Update Topic</button>
                    <a href="{% url 'manage_topics' %}" class="btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
